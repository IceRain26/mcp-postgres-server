services:
  postgres:
      image: postgres:17-alpine
      container_name: mcp-postgres
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: secret
        POSTGRES_DB: testdb
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      restart: unless-stopped

volumes:
    postgres_data: